<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet-Check Pro | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; font-family: ui-sans-serif, system-ui; }
        .match-card { background: #0f172a; border: 1px solid #1e293b; border-left: 4px solid #22c55e; }
        .glow-text { text-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="text-slate-100">

    <nav class="sticky top-0 z-50 bg-slate-900/95 border-b border-slate-800 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black italic uppercase text-white">Bet-Check <span class="text-green-500">Pro</span></h1>
        <div id="led" class="w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308]"></div>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <div id="logs" class="mb-4 p-3 bg-black rounded-xl border border-slate-800 font-mono text-[10px] text-green-400 h-28 overflow-y-auto leading-tight shadow-inner">
            > Sistema reconfigurado. Listo para usar nuevas llaves.
        </div>

        <button onclick="startSync()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black uppercase italic tracking-widest mb-8 shadow-lg active:scale-95 transition-all">
            Sincronizar Datos Reales
        </button>

        <div id="match-container" class="space-y-4 pb-12">
            <p class="text-slate-500 text-[10px] text-center uppercase font-bold tracking-widest">Esperando conexión...</p>
        </div>
    </main>

    <script>
        const container = document.getElementById('match-container');
        const logBox = document.getElementById('logs');
        const led = document.getElementById('led');

        const apiKeys = [
            'a77dea56d704b043c7d830c465fd9c77',
            '156871ed43589e21eec63a59a7950a68',
            'd5cb67fc71d47c4baab01ee7b11c651b',
            '2db659a3764ff534635b09ec70e32d87',
            'bf7bfaf1f8ae1db4ab392cef02d0f6ec'
        ];
        let currentKeyIndex = 0;

        function logger(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML = `<div class="${isError ? 'text-red-400' : 'text-green-400'}">[${time}] ${msg}</div>` + logBox.innerHTML;
        }

        async function startSync() {
            logger("Iniciando conexión con nuevas API Keys...");
            led.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse shadow-[0_0_10px_#eab308]";
            await fetchData();
        }

        async function fetchData() {
            const key = apiKeys[currentKeyIndex];
            
            // He cambiado el proveedor para que acepte tus hashes directamente
            const targetUrl = `https://v3.football.api-sports.io/fixtures?live=all`;
            
            try {
                const response = await fetch(targetUrl, {
                    method: "GET",
                    headers: {
                        "x-rapidapi-key": key,
                        "x-rapidapi-host": "v3.football.api-sports.io"
                    }
                });

                if (!response.ok) throw new Error("Acceso denegado");
                
                const data = await response.json();

                if (!data.response || data.response.length === 0) {
                    throw new Error("Sin partidos en vivo");
                }

                logger(`¡Conectado! Núcleo ${currentKeyIndex + 1} activo.`);
                render(data.response);
                led.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";

            } catch (e) {
                logger(`Error en Llave ${currentKeyIndex + 1}: ${e.message}`, true);
                
                if (currentKeyIndex < apiKeys.length - 1) {
                    currentKeyIndex++;
                    logger("Intentando con llave de respaldo...");
                    setTimeout(fetchData, 1000);
                } else {
                    led.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
                    container.innerHTML = '<p class="text-red-500 text-center text-xs uppercase font-bold">Error Crítico: Revisa tus suscripciones de API</p>';
                }
            }
        }

        function render(fixtures) {
            container.innerHTML = '';
            fixtures.slice(0, 15).forEach(f => {
                container.innerHTML += `
                    <div class="match-card p-5 rounded-2xl shadow-xl">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[9px] font-black text-green-500 uppercase">${f.league.name}</span>
                            <span class="text-[9px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded font-bold">${f.fixture.status.elapsed}'</span>
                        </div>
                        <div class="flex justify-between items-center text-white">
                            <div class="text-sm font-bold w-2/5 text-right uppercase">${f.teams.home.name}</div>
                            <div class="text-xl font-black text-green-500 w-1/5 text-center">${f.goals.home} - ${f.goals.away}</div>
                            <div class="text-sm font-bold w-2/5 text-left uppercase">${f.teams.away.name}</div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
